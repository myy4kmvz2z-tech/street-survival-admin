<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>STREET SURVIVAL ADMIN v53</title>
  <link rel="stylesheet" href="admin.css?v=42">
</head>

<body>
  <header class="top">
    <div>
      <h1>STREET SURVIVAL ADMIN v53</h1>
      <p>Firebase Direct Control / 30秒HUNTERテスト版</p>
    </div>
    <div id="firebaseStatus" class="status status-wait">🔥 Firebase: 起動前</div>
  </header>

  <main class="wrap">
    <section class="panel">
      <h3>🌆 街ステータス</h3>
      <div class="stats">
        <div><span>👥 参加者</span><b id="playerCount">0</b></div>
        <div><span>🟢 HUNTER</span><b id="hunterCount">0</b></div>
        <div><span>🔵 RUNNER</span><b id="runnerCount">0</b></div>
        <div><span>👹 BOSS</span><b id="bossCount">0</b></div>
        <div><span>🎯 MISSION</span><b id="missionCount">0</b></div>
        <div><span>🛡 SAFE</span><b id="safeCount">0</b></div>
      </div>
    </section>

    <section class="panel">
      <h3>🛠 ADMIN CONTROL v53</h3>
      <div style="display:grid;gap:10px;">
        <button id="adminTestHuntersBtn" style="padding:12px;font-size:16px;">⏱ テスト30秒HUNTER</button>
        <button id="adminAllRunnerBtn" style="padding:12px;font-size:16px;">🔵 全員RUNNERに戻す</button>
        <button id="adminCleanupPlayersBtn" style="padding:12px;font-size:16px;">🧹 古い参加者削除</button>
      </div>
      <p id="adminV39Status" style="font-size:13px;color:#aaa;margin-bottom:0;">v53: 待機中</p>
    </section>

    <section class="panel">
      <h3>📋 運営ログ</h3>
      <pre id="log"></pre>
    </section>
  </main>

  <script src="firebase-config.js?v=42"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
  let db = null;

  function log(msg){
    const el = document.getElementById("log");
    const t = new Date().toLocaleTimeString();
    if(el) el.textContent = "[" + t + "] " + msg + "\n" + el.textContent;
    console.log(msg);
  }

  function setStatus(text, cls){
    const el = document.getElementById("firebaseStatus");
    if(!el) return;
    el.textContent = text;
    el.className = "status " + (cls || "status-wait");
  }

  function setText(id, text){
    const el = document.getElementById(id);
    if(el) el.textContent = text;
  }

  function roleOf(p){
    return String((p && p.role) || "RUNNER").toUpperCase();
  }

  function updateStats(players){
    const list = players || {};
    const values = Object.values(list);

    const total = values.length;
    const hunters = values.filter(p => roleOf(p) === "HUNTER").length;
    const runners = values.filter(p => roleOf(p) === "RUNNER").length;
    const bosses = values.filter(p => roleOf(p) === "BOSS").length;
    const missions = values.filter(p => p && (p.mission === true || String(p.status || "").toUpperCase() === "MISSION")).length;
    const safes = values.filter(p => p && (String(p.area || "").toUpperCase() === "SAFE" || String(p.status || "").toUpperCase() === "SAFE")).length;

    setText("playerCount", total);
    setText("hunterCount", hunters);
    setText("runnerCount", runners);
    setText("bossCount", bosses);
    setText("missionCount", missions);
    setText("safeCount", safes);

    log("参加者更新: " + total + "人 / RUNNER " + runners + " / HUNTER " + hunters);
  }

  function initFirebase(){
    try{
      setStatus("🔥 Firebase: 接続準備中", "status-wait");
      log("v53 Firebase接続開始");

      if(!window.STREET_SURVIVAL_FIREBASE_CONFIG){
        setStatus("🔥 Firebase: 設定なし", "status-error");
        log("Firebase設定なし");
        return;
      }

      if(!window.firebase){
        setStatus("🔥 Firebase: 本体未読込", "status-error");
        log("Firebase本体未読込");
        return;
      }

      if(!firebase.apps.length){
        firebase.initializeApp(window.STREET_SURVIVAL_FIREBASE_CONFIG);
      }

      db = firebase.database();

      setStatus("🔥 Firebase: 接続OK", "status-ok");
      log("v53 Firebase接続OK");

      db.ref("streetSurvival/players").on("value", snap => {
        updateStats(snap.val() || {});
      });

    }catch(e){
      console.error(e);
      setStatus("🔥 Firebase: エラー", "status-error");
      log("Firebaseエラー: " + e.message);
    }
  }

  async function testHunters30(){
    try{
      log("⏱ テスト30秒HUNTERボタン押しました");

      if(!db){
        log("Firebase未接続。再接続します");
        initFirebase();
        await new Promise(resolve => setTimeout(resolve, 800));
      }

      if(!db){
        log("テストHUNTER失敗: Firebase未接続");
        return;
      }

      const snap = await db.ref("streetSurvival/players").get();
      const players = snap.val() || {};
      const entries = Object.entries(players).filter(([key, p]) => p);

      if(entries.length === 0){
        log("テストHUNTER失敗: 参加者0人");
        return;
      }

      const shuffled = entries.sort(() => Math.random() - 0.5);
      const hunterCount = Math.min(3, shuffled.length);
      const hunterKeys = new Set(shuffled.slice(0, hunterCount).map(([key]) => key));

      const updates = {};
      const now = Date.now();

      entries.forEach(([key, p]) => {
        const isHunter = hunterKeys.has(key);
        updates[key + "/role"] = isHunter ? "HUNTER" : "RUNNER";
        updates[key + "/hunterEndsAt"] = isHunter ? now + 30 * 1000 : null;
        updates[key + "/lastAdminAction"] = "TEST_30SEC_HUNTERS";
        updates[key + "/lastSeen"] = now;
      });

      await db.ref("streetSurvival/players").update(updates);

      await db.ref("streetSurvival/currentCommand").set({
        id: "test_hunter_" + Date.now(),
        type: "RADIO",
        message: "⏱ テスト30秒HUNTER発生！" + hunterCount + "人がHUNTERになりました！",
        at: new Date().toISOString(),
        from: "admin-v53"
      });

      log("テスト30秒HUNTER OK: " + hunterCount + "人");
    }catch(e){
      console.error(e);
      log("テストHUNTERエラー: " + e.message);
    }
  }

  async function allRunner(){
    try{
      if(!db){
        initFirebase();
        await new Promise(resolve => setTimeout(resolve, 800));
      }

      const snap = await db.ref("streetSurvival/players").get();
      const players = snap.val() || {};
      const updates = {};
      const now = Date.now();

      Object.entries(players).forEach(([key, p]) => {
        if(!p) return;
        updates[key + "/role"] = "RUNNER";
        updates[key + "/hunterEndsAt"] = null;
        updates[key + "/lastAdminAction"] = "ALL_RUNNER";
        updates[key + "/lastSeen"] = now;
      });

      await db.ref("streetSurvival/players").update(updates);
      log("全員RUNNER OK");
    }catch(e){
      log("全員RUNNERエラー: " + e.message);
    }
  }

  async function cleanupPlayers(){
    try{
      if(!db){
        initFirebase();
        await new Promise(resolve => setTimeout(resolve, 800));
      }

      const snap = await db.ref("streetSurvival/players").get();
      const players = snap.val() || {};
      const updates = {};
      const now = Date.now();
      let count = 0;

      Object.entries(players).forEach(([key, p]) => {
        if(!p) return;
        const lastSeen = Number(p.lastSeen || 0);
        if(!lastSeen || now - lastSeen > 1000 * 60 * 3){
          updates[key] = null;
          count++;
        }
      });

      await db.ref("streetSurvival/players").update(updates);
      log("古い参加者削除OK: " + count + "件");
    }catch(e){
      log("削除エラー: " + e.message);
    }
  }

  window.addEventListener("load", function(){
    log("v53 script 起動");
    initFirebase();

    const testBtn = document.getElementById("adminTestHuntersBtn");
    const runnerBtn = document.getElementById("adminAllRunnerBtn");
    const cleanupBtn = document.getElementById("adminCleanupPlayersBtn");

    if(testBtn) testBtn.addEventListener("click", testHunters30);
    if(runnerBtn) runnerBtn.addEventListener("click", allRunner);
    if(cleanupBtn) cleanupBtn.addEventListener("click", cleanupPlayers);

    log("v53 ボタン接続OK");
  });
  </script>
</body>
</html>
