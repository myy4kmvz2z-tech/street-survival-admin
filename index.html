<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>STREET SURVIVAL ADMIN v1.0</title>
  <link rel="stylesheet" href="admin.css?v=42">
</head>

<body>
  <header class="top">
    <div>
      <h1>STREET SURVIVAL ADMIN v1.0</h1>
      <p>Firebase Direct Control / 本番運営版</p>
    </div>
    <div id="firebaseStatus" class="status status-wait">🔥 Firebase: 起動前</div>
  </header>

  <div id="toast" class="toast hidden">送信成功</div>

  <main class="wrap">

    <section class="panel">
      <h3>🗂 イベント発令</h3>
      <div class="grid">
        <button class="normal" data-type="NORMAL" data-radio="🌆 通常モードです。">🌆<b>NORMAL</b><small>通常</small></button>
        <button class="alert" data-type="ALERT" data-radio="⚠️ 警戒モード発令！街に注意してください。">⚠️<b>ALERT</b><small>警戒</small></button>
        <button class="boss" data-type="BOSS" data-radio="👹 新町にBOSS出現！討伐チャンス！">👹<b>BOSS</b><small>新町出現</small></button>
        <button class="mission" data-type="MISSION" data-radio="🎯 本町集合ミッション開始！">🎯<b>MISSION</b><small>本町集合</small></button>
        <button class="live" data-type="LIVE" data-radio="🎵 オルタネーターズLIVE開始！お宿 Onn前へ！">🎵<b>LIVE</b><small>オルタ開始</small></button>
        <button class="safe" data-type="SAFE" data-radio="🛡 お宿 Onn SAFE ZONE発動！HP回復できます！">🛡<b>SAFE</b><small>Onn安全</small></button>
        <button class="final" data-type="FINAL" data-radio="🔥 FINAL BATTLE開始！HP吸収2倍！POINT2倍！">🔥<b>FINAL</b><small>終盤戦</small></button>
        <button class="end" data-type="END" data-radio="🏆 GAME END！お宿 Onn前へ集合！">🏆<b>END</b><small>終了</small></button>
      </div>
    </section>

    <section class="panel">
      <h3>📡 RADIO送信</h3>
      <input id="radioInput" value="本町で戦闘発生！">
      <button id="radioSend" class="send">📻 RADIOを送信</button>
    </section>

    <section class="panel">
      <h3>🌆 街ステータス v1.0</h3>
      <div class="stats">
        <div><span>👥 参加者</span><b id="playerCount">0</b></div>
        <div><span>🟢 HUNTER</span><b id="hunterCount">0</b></div>
        <div><span>🔵 RUNNER</span><b id="runnerCount">0</b></div>
        <div><span>👹 BOSS</span><b id="bossCount">0</b></div>
        <div><span>🎯 MISSION</span><b id="missionCount">0</b></div>
        <div><span>🛡 SAFE</span><b id="safeCount">0</b></div>
      </div>
    </section>

    <section class="panel">
      <h3>👥 参加者一覧 v1.0</h3>
      <div id="playerList" class="player-list">
        <p class="player-list-empty">参加者はまだいません</p>
      </div>
    </section>

    <section class="panel">
      <h3>⚙ イベント設定 v1.0</h3>
      <div style="display:grid;gap:10px;">
        <label style="display:block;font-size:14px;color:#aeb7c2;">イベント名<input id="eventNameInput" value="STREET SURVIVAL"></label>
        <label style="display:block;font-size:14px;color:#aeb7c2;">HUNTER時間（分）<input id="hunterMinutesInput" type="number" value="10"></label>
        <label style="display:block;font-size:14px;color:#aeb7c2;">テストHUNTER秒数<input id="testHunterSecondsInput" type="number" value="30"></label>
        <label style="display:block;font-size:14px;color:#aeb7c2;">初期HP<input id="initialHpInput" type="number" value="100"></label>
        <label style="display:block;font-size:14px;color:#aeb7c2;">最大HP<input id="maxHpInput" type="number" value="300"></label>
        <label style="display:block;font-size:14px;color:#aeb7c2;">吸収距離（m）<input id="battleRangeInput" type="number" value="7"></label>
        <label style="display:block;font-size:14px;color:#aeb7c2;">警告距離（m）<input id="warningRangeInput" type="number" value="15"></label>
        <label style="display:block;font-size:14px;color:#aeb7c2;">SAFEエリア名<input id="safeNameInput" value="お宿 Onn"></label>
        <label style="display:block;font-size:14px;color:#aeb7c2;">BOSSメッセージ<input id="bossMessageInput" value="👹 BOSS出現！"></label>
        <label style="display:block;font-size:14px;color:#aeb7c2;">MISSIONメッセージ<input id="missionMessageInput" value="🎯 MISSION発生！"></label>
        <label style="display:block;font-size:14px;color:#aeb7c2;">LIVEメッセージ<input id="liveMessageInput" value="🎵 LIVE開始！"></label>
      </div>
      <button id="saveSettingsBtn" class="send">💾 設定を保存</button>
      <p id="settingsStatus" style="font-size:13px;color:#aaa;margin-bottom:0;">設定: 初期値を使用中</p>
    </section>

    <section class="panel">
      <h3>🛠 ADMIN CONTROL v1.0</h3>
      <div style="display:grid;gap:10px;">
        <button id="testHunterBtn" style="padding:12px;font-size:16px;">⏱ テスト30秒HUNTER</button>
        <button id="randomHunterBtn" style="padding:12px;font-size:16px;">🎲 ランダム3人HUNTER / 10分</button>
        <button id="allRunnerBtn" style="padding:12px;font-size:16px;">🔵 全員RUNNERに戻す</button>
        <button id="healAllBtn" style="padding:12px;font-size:16px;">❤️ 全員HP回復</button>
        <button id="resetAllBtn" style="padding:12px;font-size:16px;">🔄 全員リセット</button>
        <button id="cleanupBtn" style="padding:12px;font-size:16px;">🧹 古い参加者削除</button>
        <button id="forceDeleteBtn" style="padding:12px;font-size:16px;background:#5b1111;color:#fff;">⚠️ 全参加者を強制削除</button>
      </div>
      <p id="adminStatus" style="font-size:13px;color:#aaa;margin-bottom:0;">v1.0: 待機中</p>
    </section>

    <section class="panel">
      <h3>📋 運営ログ</h3>
      <pre id="log"></pre>
    </section>

  </main>

  <script src="firebase-config.js?v=42"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    let db = null;

    const $ = id => document.getElementById(id);

    function log(msg){
      const el = $("log");
      const t = new Date().toLocaleTimeString();
      if(el) el.textContent = "[" + t + "] " + msg + "\n" + el.textContent;
      console.log(msg);
    }

    function setStatus(text, cls){
      const el = $("firebaseStatus");
      if(!el) return;
      el.textContent = text;
      el.className = "status " + (cls || "status-wait");
    }

    function setAdminStatus(text){
      const el = $("adminStatus");
      if(el) el.textContent = text;
    }

    function setSettingsStatus(text){
      const el = $("settingsStatus");
      if(el) el.textContent = text;
    }

    function firebaseErrorDetail(e, action){
      const code = (e && (e.code || e.name)) || "UNKNOWN";
      const message = (e && e.message) || String(e);
      let detail = "code=" + code + " / message=" + message;

      if(code === "PERMISSION_DENIED" || /permission/i.test(String(code)) || /permission/i.test(message)){
        detail = "permission_denied: Firebase Rulesで streetSurvival/settings への" + (action || "アクセス") + "が拒否されました / " + detail;
      }

      return detail;
    }

    function applySettingsToForm(s){
      if(!s) return;
      $("eventNameInput").value = s.eventName ?? "STREET SURVIVAL";
      $("hunterMinutesInput").value = s.hunterMinutes ?? 10;
      $("testHunterSecondsInput").value = s.testHunterSeconds ?? 30;
      $("initialHpInput").value = s.initialHp ?? 100;
      $("maxHpInput").value = s.maxHp ?? 300;
      $("battleRangeInput").value = s.battleRange ?? 7;
      $("warningRangeInput").value = s.warningRange ?? 15;
      $("safeNameInput").value = s.safeName ?? "お宿 Onn";
      $("bossMessageInput").value = s.bossMessage ?? "👹 BOSS出現！";
      $("missionMessageInput").value = s.missionMessage ?? "🎯 MISSION発生！";
      $("liveMessageInput").value = s.liveMessage ?? "🎵 LIVE開始！";
    }

    function collectSettingsFromForm(){
      return {
        eventName: $("eventNameInput").value.trim() || "STREET SURVIVAL",
        hunterMinutes: Number($("hunterMinutesInput").value) || 10,
        testHunterSeconds: Number($("testHunterSecondsInput").value) || 30,
        initialHp: Number($("initialHpInput").value) || 100,
        maxHp: Number($("maxHpInput").value) || 300,
        battleRange: Number($("battleRangeInput").value) || 7,
        warningRange: Number($("warningRangeInput").value) || 15,
        safeName: $("safeNameInput").value.trim() || "お宿 Onn",
        bossMessage: $("bossMessageInput").value.trim() || "👹 BOSS出現！",
        missionMessage: $("missionMessageInput").value.trim() || "🎯 MISSION発生！",
        liveMessage: $("liveMessageInput").value.trim() || "🎵 LIVE開始！",
        updatedAt: new Date().toISOString()
      };
    }

    async function loadSettings(){
      if(!db){
        setSettingsStatus("設定: 初期値を使用中");
        return;
      }

      try{
        const snap = await db.ref("streetSurvival/settings").once("value");

        if(!snap.exists()){
          setSettingsStatus("設定: 初期値を使用中");
          log("イベント設定なし（初期値を使用中）");
          return;
        }

        const settings = snap.val();
        if(!settings || typeof settings !== "object"){
          setSettingsStatus("設定: 初期値を使用中");
          log("イベント設定なし（初期値を使用中）");
          return;
        }

        applySettingsToForm(settings);
        setSettingsStatus("設定: 読込OK");
        log("イベント設定を読み込みました");
      }catch(e){
        const detail = firebaseErrorDetail(e, "読み込み");
        setSettingsStatus("設定: 初期値を使用中");
        log("設定読込失敗（初期値を使用中）: " + detail);
        console.warn("loadSettings:", e);
      }
    }

    async function saveSettings(){
      try{
        if(!db){
          initFirebase();
          await new Promise(resolve => setTimeout(resolve, 800));
        }

        if(!db){
          setSettingsStatus("設定: Firebase未接続");
          log("設定保存失敗: Firebase未接続");
          return;
        }

        const settings = collectSettingsFromForm();
        log("設定保存開始: streetSurvival/settings");
        await db.ref("streetSurvival/settings").set(settings);

        setSettingsStatus("設定: 保存OK");
        showToast("設定を保存しました");
        log("イベント設定を保存しました");
      }catch(e){
        const code = (e && (e.code || e.name)) || "";
        const message = (e && e.message) || String(e);
        const isPermissionDenied = code === "PERMISSION_DENIED" || /permission/i.test(String(code)) || /permission/i.test(message);

        if(isPermissionDenied){
          setSettingsStatus("設定: 保存エラー: " + message);
          log("設定保存エラー: Firebase Rulesで settings への書き込みが許可されていません");
        }else{
          const detail = firebaseErrorDetail(e, "書き込み");
          const errText = message || detail;
          setSettingsStatus("設定: 保存エラー: " + errText);
          log("設定保存エラー: " + detail);
        }

        console.error("saveSettings:", e);
      }
    }

    function setText(id, text){
      const el = $(id);
      if(el) el.textContent = text;
    }

    function showToast(msg){
      const el = $("toast");
      if(!el) return;
      el.textContent = msg;
      el.classList.remove("hidden");
      setTimeout(() => el.classList.add("hidden"), 1500);
    }

    function roleOf(p){
      return String((p && p.role) || "RUNNER").toUpperCase();
    }

    function escapeHtml(text){
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function parseTime(value){
      if(value == null || value === "") return null;
      if(typeof value === "number") return value;
      const n = Number(value);
      if(!Number.isNaN(n) && n > 0) return n;
      const d = Date.parse(String(value));
      return Number.isNaN(d) ? null : d;
    }

    function formatTimeAgo(value){
      const ts = parseTime(value);
      if(!ts) return "";
      const diff = Date.now() - ts;
      if(diff < 0) return "たった今";
      const sec = Math.floor(diff / 1000);
      if(sec < 60) return sec + "秒前";
      const min = Math.floor(sec / 60);
      if(min < 60) return min + "分前";
      const hour = Math.floor(min / 60);
      if(hour < 24) return hour + "時間前";
      return Math.floor(hour / 24) + "日前";
    }

    function roleDisplay(role){
      const r = String(role || "").toUpperCase();
      if(r === "RUNNER") return "🔵 RUNNER";
      if(r === "HUNTER") return "🟢 HUNTER";
      if(r === "BOSS") return "👹 BOSS";
      if(r === "SAFE") return "🛡 SAFE";
      return "⚪ UNKNOWN";
    }

    function roleClass(role){
      const r = String(role || "").toUpperCase();
      if(r === "RUNNER") return "role-runner";
      if(r === "HUNTER") return "role-hunter";
      if(r === "BOSS") return "role-boss";
      if(r === "SAFE") return "role-safe";
      return "role-unknown";
    }

    function onlineBadgeClass(online){
      return online === true ? "online-on" : "online-off";
    }

    function getHunterMinutes(){
      return Number($("hunterMinutesInput")?.value) || 10;
    }

    function getMaxHp(){
      return Number($("maxHpInput")?.value) || 300;
    }

    function playerNickname(p, id){
      return (p && (p.nickname || p.name)) || id;
    }

    function renderPlayerList(players){
      const container = $("playerList");
      if(!container) return;

      const entries = Object.entries(players || {}).filter(([id, p]) => p && typeof p === "object");

      if(entries.length === 0){
        container.innerHTML = '<p class="player-list-empty">参加者はまだいません</p>';
        return;
      }

      entries.sort((a, b) => {
        const ta = parseTime(a[1].updatedAt) || parseTime(a[1].joinedAt) || 0;
        const tb = parseTime(b[1].updatedAt) || parseTime(b[1].joinedAt) || 0;
        return tb - ta;
      });

      container.innerHTML = entries.map(([id, p]) => {
        const nickname = playerNickname(p, id);
        const role = roleOf(p);
        const hp = Number(p.hp ?? 0);
        const points = Number(p.points ?? 0);
        const online = p.online === true;
        const onlineText = online ? "ONLINE" : "OFFLINE";
        const ago = formatTimeAgo(p.updatedAt);
        const safeId = escapeHtml(id);
        const safeName = escapeHtml(nickname);
        const statusText = ago ? escapeHtml(ago) : "不明";

        return (
          '<div class="player-card" data-player-id="' + safeId + '">' +
            '<div class="player-card-name">' + safeName + '</div>' +
            '<div class="player-card-badges">' +
              '<span class="player-badge ' + roleClass(role) + '">' + roleDisplay(role) + '</span>' +
            '</div>' +
            '<div class="player-card-stats">HP:' + hp + ' / POINT:' + points + '</div>' +
            '<div class="player-card-status">' +
              '最終更新: ' + statusText + ' / ' +
              '<span class="player-badge ' + onlineBadgeClass(online) + '">' + onlineText + '</span>' +
            '</div>' +
            '<div class="player-card-actions">' +
              '<button type="button" class="player-btn-runner" data-action="runner" data-id="' + safeId + '" data-name="' + safeName + '">🔵 RUNNER</button>' +
              '<button type="button" class="player-btn-hunter" data-action="hunter" data-id="' + safeId + '" data-name="' + safeName + '">🟢 HUNTER</button>' +
              '<button type="button" class="player-btn-heal" data-action="heal" data-id="' + safeId + '" data-name="' + safeName + '">❤️ HP回復</button>' +
              '<button type="button" class="player-btn-delete" data-action="delete" data-id="' + safeId + '" data-name="' + safeName + '">🗑 削除</button>' +
            '</div>' +
          '</div>'
        );
      }).join("");
    }

    async function ensureDbReady(){
      if(!db){
        initFirebase();
        await new Promise(resolve => setTimeout(resolve, 800));
      }
      return !!db;
    }

    async function setPlayerRunner(playerId, nickname){
      try{
        if(!(await ensureDbReady())){
          log("参加者操作失敗: Firebase未接続");
          return;
        }

        const now = Date.now();
        await db.ref("streetSurvival/players/" + playerId).update({
          role: "RUNNER",
          hunterUntil: null,
          updatedAt: now
        });

        log("🔵 RUNNER化: " + nickname);
      }catch(e){
        log("参加者一覧エラー: " + e.message);
      }
    }

    async function setPlayerHunter(playerId, nickname){
      try{
        if(!(await ensureDbReady())){
          log("参加者操作失敗: Firebase未接続");
          return;
        }

        const now = Date.now();
        const minutes = getHunterMinutes();
        await db.ref("streetSurvival/players/" + playerId).update({
          role: "HUNTER",
          hunterUntil: now + minutes * 60 * 1000,
          updatedAt: now
        });

        log("🟢 HUNTER化: " + nickname + " / " + minutes + "分");
      }catch(e){
        log("参加者一覧エラー: " + e.message);
      }
    }

    async function healPlayer(playerId, nickname){
      try{
        if(!(await ensureDbReady())){
          log("参加者操作失敗: Firebase未接続");
          return;
        }

        const maxHp = getMaxHp();
        await db.ref("streetSurvival/players/" + playerId).update({
          hp: maxHp,
          updatedAt: Date.now()
        });

        log("❤️ HP回復: " + nickname + " / HP:" + maxHp);
      }catch(e){
        log("参加者一覧エラー: " + e.message);
      }
    }

    async function deletePlayer(playerId, nickname){
      try{
        if(!(await ensureDbReady())){
          log("参加者操作失敗: Firebase未接続");
          return;
        }

        const ok = confirm('参加者「' + nickname + '」を削除しますか？');
        if(!ok){
          log("参加者削除をキャンセル: " + nickname);
          return;
        }

        await db.ref("streetSurvival/players/" + playerId).remove();
        log("🗑 参加者削除: " + nickname);
      }catch(e){
        log("参加者一覧エラー: " + e.message);
      }
    }

    function handlePlayerListClick(e){
      const btn = e.target.closest("[data-action]");
      if(!btn || !btn.dataset.id) return;

      const playerId = btn.dataset.id;
      const nickname = btn.dataset.name || playerId;
      const action = btn.dataset.action;

      if(action === "runner") setPlayerRunner(playerId, nickname);
      else if(action === "hunter") setPlayerHunter(playerId, nickname);
      else if(action === "heal") healPlayer(playerId, nickname);
      else if(action === "delete") deletePlayer(playerId, nickname);
    }

    function updateStats(players){
      const list = players || {};
      const values = Object.values(list);

      const total = values.length;
      const hunters = values.filter(p => roleOf(p) === "HUNTER").length;
      const runners = values.filter(p => roleOf(p) === "RUNNER").length;
      const bosses = values.filter(p => roleOf(p) === "BOSS").length;
      const missions = values.filter(p => p && (p.mission === true || String(p.status || "").toUpperCase() === "MISSION")).length;
      const safes = values.filter(p => p && (String(p.area || "").toUpperCase() === "SAFE" || String(p.status || "").toUpperCase() === "SAFE")).length;

      setText("playerCount", total);
      setText("hunterCount", hunters);
      setText("runnerCount", runners);
      setText("bossCount", bosses);
      setText("missionCount", missions);
      setText("safeCount", safes);
    }

    function initFirebase(){
      try{
        setStatus("🔥 Firebase: 接続準備中", "status-wait");
        log("v1.0 Firebase接続開始");

        if(!window.STREET_SURVIVAL_FIREBASE_CONFIG){
          setStatus("🔥 Firebase: 設定なし", "status-error");
          log("Firebase設定なし");
          return;
        }

        if(!window.firebase){
          setStatus("🔥 Firebase: 本体未読込", "status-error");
          log("Firebase本体未読込");
          return;
        }

        if(!firebase.apps.length){
          firebase.initializeApp(window.STREET_SURVIVAL_FIREBASE_CONFIG);
        }

        db = firebase.database();

        setStatus("🔥 Firebase: 接続OK", "status-ok");
        setAdminStatus("v1.0: Firebase接続OK");
        log("v1.0 Firebase接続OK");

        db.ref("streetSurvival/players").on("value", snap => {
          try{
            const players = snap.val() || {};
            updateStats(players);
            renderPlayerList(players);

            const values = Object.values(players);
            const hunters = values.filter(p => roleOf(p) === "HUNTER").length;
            const runners = values.filter(p => roleOf(p) === "RUNNER").length;
            log("参加者更新: " + values.length + "人 / RUNNER " + runners + " / HUNTER " + hunters);
          }catch(e){
            log("参加者一覧エラー: " + e.message);
          }
        }, err => {
          log("参加者一覧エラー: " + ((err && err.message) || err));
        });

        loadSettings();

      }catch(e){
        console.error(e);
        setStatus("🔥 Firebase: エラー", "status-error");
        log("Firebaseエラー: " + e.message);
      }
    }

    async function sendCommand(type, message){
      if(!db){
        log("Firebase未接続。再接続します");
        initFirebase();
        await new Promise(resolve => setTimeout(resolve, 800));
      }

      if(!db){
        log("送信失敗: Firebase未接続");
        return;
      }

      const cmd = {
        id: type.toLowerCase() + "_" + Date.now(),
        type,
        message: message || "",
        at: new Date().toISOString(),
        from: "admin-v1.0"
      };

      await db.ref("streetSurvival/currentCommand").set(cmd);
      await db.ref("streetSurvival/commandLog").push(cmd);

      showToast("送信成功: " + type);
      log("Firebase送信OK: " + type + (message ? " / " + message : ""));
    }

    async function setRandomHunters(durationMs, label){
      try{
        if(!db){
          initFirebase();
          await new Promise(resolve => setTimeout(resolve, 800));
        }

        if(!db){
          log(label + "失敗: Firebase未接続");
          return;
        }

        const snap = await db.ref("streetSurvival/players").get();
        const players = snap.val() || {};
        const entries = Object.entries(players).filter(([key, p]) => p);

        if(entries.length === 0){
          log(label + "失敗: 参加者0人");
          return;
        }

        const shuffled = entries.sort(() => Math.random() - 0.5);
        const hunterCount = Math.min(3, shuffled.length);
        const hunterKeys = new Set(shuffled.slice(0, hunterCount).map(([key]) => key));

        const updates = {};
        const now = Date.now();

        entries.forEach(([key, p]) => {
          const isHunter = hunterKeys.has(key);
          updates[key + "/role"] = isHunter ? "HUNTER" : "RUNNER";
          updates[key + "/hunterEndsAt"] = isHunter ? now + durationMs : null;
          updates[key + "/lastAdminAction"] = label;
          updates[key + "/lastSeen"] = now;
        });

        await db.ref("streetSurvival/players").update(updates);

        await sendCommand(
          "RADIO",
          label + "発生！" + hunterCount + "人がHUNTERになりました！"
        );

        log(label + " OK: " + hunterCount + "人");
        setAdminStatus(label + " OK: " + hunterCount + "人");

      }catch(e){
        console.error(e);
        log(label + " エラー: " + e.message);
      }
    }

    async function cleanupPlayers(){
      try{
        if(!db){
          initFirebase();
          await new Promise(resolve => setTimeout(resolve, 800));
        }

        const snap = await db.ref("streetSurvival/players").get();
        const players = snap.val() || {};
        const updates = {};
        const now = Date.now();
        let count = 0;

        Object.entries(players).forEach(([key, p]) => {
          if(!p) return;
          const lastSeen = Number(p.lastSeen || 0);

          if(!lastSeen || now - lastSeen > 1000 * 60 * 3){
            updates[key] = null;
            count++;
          }
        });

        await db.ref("streetSurvival/players").update(updates);
        log("古い参加者削除OK: " + count + "件");
      }catch(e){
        log("削除エラー: " + e.message);
      }
    }
